<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Novedades adulto - Catálogo interactivo</title><style>
:root{--bg:#faf8f4;--ink:#242424;--muted:#6b625b;--card:#fff}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}header{padding:28px 18px 22px;text-align:center;background:linear-gradient(135deg,#fff7f0,#f7e3e9);border-bottom:1px solid #ead8d8}h1{margin:0;font-size:clamp(28px,4vw,48px);letter-spacing:.03em;text-transform:uppercase}.subtitle{margin:10px auto 0;color:var(--muted);max-width:900px}.controls{position:sticky;top:0;z-index:5;display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;padding:14px;background:rgba(250,248,244,.96);border-bottom:1px solid #ead8d8}input,select{border:1px solid #d7c5c5;border-radius:999px;padding:11px 15px;background:#fff;font-size:15px}input{width:min(620px,92vw)}main{width:100%;max-width:none;margin:0;padding:22px 34px 42px}.section-title{margin:30px 0 18px;padding:12px 16px;border-radius:18px;font-size:22px;font-weight:800;background:#fff;border:1px solid #ead8d8}.grid{display:grid;grid-template-columns:repeat(4,minmax(170px,1fr));gap:36px 30px;align-items:start}.card{background:var(--card);border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,.10);overflow:hidden;border:1px solid #eee;cursor:pointer;transition:.15s}.card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.16)}.coverWrap{aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:#f2eee9}.cover{width:100%;height:100%;object-fit:contain;display:block;padding:8px}.meta{padding:12px}.title{font-weight:800;font-size:15px;line-height:1.2;text-transform:uppercase}.author{margin-top:6px;color:#0b5fa5;font-weight:700;font-size:14px}.genrePill{display:inline-block;margin-top:9px;border-radius:999px;padding:5px 8px;font-size:11px;font-weight:700}.empty{text-align:center;padding:40px;color:var(--muted)}.count{color:var(--muted);font-weight:700}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal.open{display:flex}.dialog{width:min(920px,96vw);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 25px 70px rgba(0,0,0,.35);position:relative}.close{position:absolute;right:14px;top:12px;border:none;background:#d71920;color:white;font-size:24px;width:44px;height:44px;border-radius:50%;cursor:pointer}.dialogInner{display:grid;grid-template-columns:minmax(190px,280px) 1fr;gap:24px;padding:30px}.dialog img{width:100%;border-radius:14px;box-shadow:0 8px 22px rgba(0,0,0,.18)}.dialog h2{margin:0 50px 8px 0;font-size:30px;text-transform:uppercase}.dialog .by{color:#0b5fa5;font-weight:800;font-size:18px;margin-bottom:14px}.synopsis{font-size:17px;line-height:1.55}@media(max-width:900px){main{padding:18px 16px}.grid{grid-template-columns:repeat(3,minmax(130px,1fr));gap:24px 18px}.dialogInner{grid-template-columns:1fr}.dialog img{max-width:230px;margin:auto}}@media(max-width:560px){.grid{grid-template-columns:repeat(2,minmax(120px,1fr));gap:20px 14px}.title{font-size:13px}.author{font-size:12px}}
</style></head><body><header><h1>Novedades adulto</h1><p class="subtitle">Catálogo interactivo por géneros. Pincha en cualquier portada para ver la sinopsis.</p></header><div class="controls"><input id="search" type="search" placeholder="Buscar por título, autor o sinopsis…"><select id="genre"></select><span class="count" id="count"></span></div><main id="app"></main><div class="modal" id="modal" role="dialog" aria-modal="true"><div class="dialog"><button class="close" id="close" aria-label="Cerrar">×</button><div class="dialogInner" id="dialogInner"></div></div></div><script>const books = [{"genre": "NOVELA CONTEMPORÁNEA", "title": "COMERÁS FLORES", "author": "Lucía Solla Sobral", "synopsis": "Una historia íntima y emocional sobre las heridas familiares, el duelo y la necesidad de reencontrarse con uno mismo. La protagonista deberá enfrentarse a secretos del pasado que marcaron su vida y la de quienes la rodean. Una novela delicada sobre la memoria, el amor y la reconstrucción personal.", "cover": "portadas/001_comeras_flores.jpg", "id": 1}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "CON NADIE", "author": "Lorenzo Silva", "synopsis": "Lorenzo Silva construye un relato intenso y contemporáneo sobre la soledad, las relaciones humanas y las decisiones que cambian una vida. Con personajes complejos y cercanos, la novela explora los silencios emocionales y la dificultad de conectar en un mundo cada vez más individualista.", "cover": "portadas/002_con_nadie.jpg", "id": 2}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "CUANDO EL VIENTO HABLE", "author": "Ángela Banzas", "synopsis": "Una novela llena de misterio y emociones ambientada en un entorno marcado por los secretos del pasado. Entre recuerdos, pérdidas y viejas heridas, sus protagonistas buscarán respuestas mientras el viento parece arrastrar verdades ocultas. Una historia evocadora y atmosférica.", "cover": "portadas/003_cuando_el_viento_hable.jpg", "id": 3}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "EL MEJOR LIBRO DEL MUNDO", "author": "Manuel Vilas", "synopsis": "Con su estilo cercano y melancólico, Manuel Vilas reflexiona sobre la literatura, la memoria y la vida cotidiana. La novela mezcla humor, emoción y nostalgia para hablar del poder de los libros y de cómo las historias nos ayudan a entender quiénes somos.", "cover": "portadas/004_el_mejor_libro_del_mundo.jpg", "id": 4}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "ENVIADO ESPECIAL", "author": "Arturo Pérez-Reverte", "synopsis": "Una apasionante mirada al oficio del corresponsal de guerra y a quienes viven al límite para contar la verdad. Pérez-Reverte mezcla aventura, tensión y reflexión personal en una historia sobre el periodismo, el peligro y las contradicciones del ser humano.", "cover": "portadas/005_enviado_especial.jpg", "id": 5}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "ESTÁ LLOVIENDO Y TE QUIERO", "author": "Antonio Mercero (escritor de Carmen Mola)", "synopsis": "Una novela emotiva y luminosa sobre el amor, las segundas oportunidades y las pequeñas casualidades que transforman una vida. Antonio Mercero crea personajes cercanos y humanos en una historia cargada de sensibilidad y esperanza.", "cover": "portadas/006_esta_lloviendo_y_te_quiero.jpg", "id": 6}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "GUÍA DE LUGARES QUE YA NO EXISTEN", "author": "Espido Freire", "synopsis": "Espido Freire propone un viaje literario por espacios desaparecidos y recuerdos perdidos. A través de una escritura elegante y nostálgica, la autora reflexiona sobre el paso del tiempo, la memoria y todo aquello que dejamos atrás sin darnos cuenta.", "cover": "portadas/007_guia_de_lugares_que_ya_no_existen.jpg", "id": 7}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "LA EDUCACIÓN DEL MONSTRUO", "author": "Elvira Mínguez", "synopsis": "Una novela impactante sobre la violencia, la exclusión y la construcción de la identidad. Elvira Mínguez retrata con fuerza psicológica el crecimiento de un personaje marcado por el dolor y el rechazo, cuestionando los límites entre víctima y monstruo.", "cover": "portadas/008_la_educacion_del_monstruo.jpg", "id": 8}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "LAS RUTAS DEL SILENCIO", "author": "Helena Serrano", "synopsis": "Una historia sobre secretos familiares, pérdidas y viajes interiores. Helena Serrano combina emoción y misterio en una novela donde el silencio pesa tanto como las palabras y donde cada personaje busca encontrar su propio lugar en el mundo.", "cover": "portadas/009_las_rutas_del_silencio.jpg", "id": 9}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "LO INESPERADO", "author": "Pedro Simón", "synopsis": "Pedro Simón retrata con sensibilidad la vida cotidiana y esos momentos que cambian el rumbo de las personas. Una novela humana y emocionante sobre las sorpresas de la vida, los vínculos familiares y la capacidad de seguir adelante pese a las dificultades.", "cover": "portadas/010_lo_inesperado.jpg", "id": 10}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "MAITE", "author": "Fernando Aramburu", "synopsis": "Aramburu vuelve a explorar las relaciones humanas y las emociones más profundas a través de un personaje inolvidable. Una historia íntima sobre el amor, la memoria y las heridas invisibles que condicionan nuestras vidas y nuestras decisiones.", "cover": "portadas/011_maite.jpg", "id": 11}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "PRINCIPIO, MEDIO, FIN", "author": "Valeria Luiselli", "synopsis": "Valeria Luiselli reúne relatos y reflexiones sobre la vida contemporánea, los afectos y la identidad. Con una prosa brillante y original, la autora aborda los vínculos humanos y el paso del tiempo desde una mirada lúcida y profundamente literaria.", "cover": "portadas/012_principio_medio_fin.jpg", "id": 12}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "LAS GRATITUDES", "author": "Delphine de Vigan", "synopsis": "Una novela delicada y conmovedora sobre la importancia de agradecer antes de que sea demasiado tarde. A través de personajes entrañables, Delphine de Vigan reflexiona sobre la memoria, la vejez y las palabras que nunca llegamos a decir.", "cover": "portadas/013_las_gratitudes.jpg", "id": 13}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "EL BUEN MAL", "author": "Samanta Schweblin", "synopsis": "Samanta Schweblin explora lo inquietante y lo extraño en una historia donde lo cotidiano se transforma poco a poco en algo perturbador. Una novela intensa y psicológica que cuestiona la realidad y los límites de nuestras emociones.", "cover": "portadas/014_el_buen_mal.jpg", "id": 14}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "MISTERIO EN EL BARRIO GÓTICO", "author": "Sergio Vila-Sanjuán", "synopsis": "Un intrigante recorrido por las calles del Barrio Gótico de Barcelona donde pasado y presente se entrelazan. Entre secretos, enigmas y personajes fascinantes, la novela combina misterio, historia y un gran amor por la ciudad.", "cover": "portadas/015_misterio_en_el_barrio_gotico.jpg", "id": 15}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "EL CORAZÓN REVOLUCIONARIO DEL MUNDO", "author": "Francisco Serrano", "synopsis": "Una reflexión literaria y política sobre los cambios sociales, las utopías y las contradicciones de nuestro tiempo. Francisco Serrano construye una novela ambiciosa que invita a pensar sobre el poder, la revolución y la condición humana.", "cover": "portadas/016_el_corazon_revolucionario_del_mundo.jpg", "id": 16}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "LA NECESIDAD DE AMAR", "author": "Pablo Álvarez", "synopsis": "Una historia emocional sobre los afectos, la búsqueda de sentido y la necesidad humana de sentirse querido. Pablo Álvarez explora las relaciones personales con sensibilidad y cercanía en una novela sobre el amor en todas sus formas.", "cover": "portadas/017_la_necesidad_de_amar.jpg", "id": 17}, {"genre": "NOVELA CONTEMPORÁNEA", "title": "YESTERYEAR", "author": "Caro Claire Burke", "synopsis": "En una comunidad perfecta inspirada en los años cincuenta, una mujer empieza a sospechar que su vida ideal esconde algo oscuro. Las dudas sobre su identidad y la realidad que la rodea la llevarán a descubrir inquietantes secretos. Un thriller de suspense psicológico con ciencia ficción y crítica social.", "cover": "portadas/018_yesteryear.jpg", "id": 18}, {"genre": "NOVELA NEGRA / THRILLER", "title": "ANTES DE QUE TODO CAMBIE", "author": "Manel Loureiro", "synopsis": "Un thriller inquietante que arrastra al lector hacia una espiral de tensión y misterio. Cuando una serie de acontecimientos inesperados altera la vida del protagonista, este deberá descubrir quién mueve los hilos antes de que sea demasiado tarde. Una novela llena de suspense, secretos y giros sorprendentes.", "cover": "portadas/019_antes_de_que_todo_cambie.jpg", "id": 19}, {"genre": "NOVELA NEGRA / THRILLER", "title": "EL AMO (JOTADÉ 2)", "author": "Santiago Díaz", "synopsis": "El inspector Jotadé regresa en una investigación oscura y peligrosa donde el poder y la corrupción se mezclan con la violencia más cruda. Santiago Díaz construye un thriller intenso, de ritmo trepidante, en el que cada pista acerca al protagonista a una verdad tan impactante como peligrosa.", "cover": "portadas/020_el_amo_jotade_2.jpg", "id": 20}, {"genre": "NOVELA NEGRA / THRILLER", "title": "EL ASESINO DE INVIERNO", "author": "Greta Alonso", "synopsis": "Una serie de crímenes cometidos en pleno invierno sacude la tranquilidad de una ciudad marcada por el miedo. Greta Alonso combina misterio, tensión psicológica y una atmósfera fría y absorbente para narrar una investigación donde nada es lo que parece y cada personaje oculta algo.", "cover": "portadas/021_el_asesino_de_invierno.jpg", "id": 21}, {"genre": "NOVELA NEGRA / THRILLER", "title": "EL INFIERNO DEL AMOR", "author": "M.C. Beaton", "synopsis": "Entre el suspense y la intriga romántica, esta novela explora cómo el amor puede convertirse en una peligrosa obsesión. M.C. Beaton crea una historia llena de secretos, engaños y emociones intensas, donde los protagonistas deberán enfrentarse a sus propios deseos y temores.", "cover": "portadas/022_el_infierno_del_amor.jpg", "id": 22}, {"genre": "NOVELA NEGRA / THRILLER", "title": "EL NOVIO", "author": "Freida McFadden", "synopsis": "Freida McFadden vuelve a jugar con la mente del lector en un thriller psicológico lleno de tensión. Una relación aparentemente perfecta comienza a mostrar grietas inquietantes, mientras secretos ocultos amenazan con destruirlo todo. Una novela adictiva y sorprendente hasta la última página.", "cover": "portadas/023_el_novio.jpg", "id": 23}, {"genre": "NOVELA NEGRA / THRILLER", "title": "EL PACTO", "author": "J.D. Barker", "synopsis": "Un oscuro acuerdo cambiará para siempre la vida de los protagonistas. J.D. Barker construye un thriller inquietante donde la ambición, el miedo y la culpa empujan a los personajes al límite. Con giros constantes y gran tensión narrativa, la novela mantiene el suspense de principio a fin.", "cover": "portadas/024_el_pacto.jpg", "id": 24}, {"genre": "NOVELA NEGRA / THRILLER", "title": "HULDA (SERIE INSPECTORA HULDA 4)", "author": "Ragnar Jónasson", "synopsis": "La inspectora Hulda se enfrenta a uno de los casos más complejos de su carrera mientras lidia con sus propios fantasmas personales. Ambientada en los paisajes fríos de Islandia, esta novela mezcla misterio, melancolía y suspense en una historia absorbente y profundamente humana.", "cover": "portadas/025_hulda_serie_inspectora_hulda_4.jpg", "id": 25}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LA CANGURO", "author": "Pablo Rivero", "synopsis": "Lo que parecía un trabajo tranquilo se transforma en una auténtica pesadilla. Pablo Rivero crea un thriller psicológico claustrofóbico donde la desconfianza y el miedo crecen página tras página. Una historia inquietante sobre secretos familiares y peligros ocultos tras las apariencias.", "cover": "portadas/026_la_canguro.jpg", "id": 26}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LA CHICA DEL LAGO", "author": "Charlie Donlea", "synopsis": "El hallazgo del cadáver de una joven junto a un lago desencadena una investigación llena de secretos y mentiras. Con una narración ágil y llena de tensión, la novela combina periodismo, misterio y thriller psicológico para construir una historia absorbente y llena de sorpresas.", "cover": "portadas/027_la_chica_del_lago.jpg", "id": 27}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LA CÁMARA DE LAS MARAVILLAS", "author": "María Oruña", "synopsis": "María Oruña mezcla intriga, emociones y secretos familiares en una novela cargada de misterio. A través de una investigación que conecta pasado y presente, los protagonistas descubrirán verdades ocultas que cambiarán sus vidas para siempre. Una lectura elegante y envolvente.", "cover": "portadas/028_la_camara_de_las_maravillas.jpg", "id": 28}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LA MIRADA DEL MAL", "author": "Reyes Monforte", "synopsis": "Una trama oscura y perturbadora donde el mal adopta múltiples rostros. Reyes Monforte explora los límites de la mente humana a través de una investigación intensa y emocional, marcada por el suspense y los secretos del pasado. Una novela absorbente y llena de tensión.", "cover": "portadas/029_la_mirada_del_mal.jpg", "id": 29}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LA PROFESORA", "author": "Freida McFadden", "synopsis": "Nada es tan perfecto como parece en este thriller psicológico cargado de tensión. Una profesora admirada por todos comienza a verse envuelta en situaciones inquietantes que revelan peligrosas verdades ocultas. Freida McFadden vuelve a sorprender con giros inesperados y una atmósfera inquietante.", "cover": "portadas/030_la_profesora.jpg", "id": 30}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LA PROMETIDA", "author": "Nieves Herrero", "synopsis": "Nieves Herrero construye una historia llena de intriga, pasiones y secretos familiares. A medida que avanza la trama, los personajes deberán enfrentarse a verdades ocultas y decisiones difíciles que pondrán a prueba su lealtad y sus sentimientos.", "cover": "portadas/031_la_prometida.jpg", "id": 31}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LAS BUENAS INTENCIONES", "author": "Víctor del Árbol", "synopsis": "Una novela intensa y emocional donde las decisiones tomadas con la mejor intención pueden desencadenar consecuencias devastadoras. Víctor del Árbol combina suspense, drama y profundidad psicológica en una historia sobre culpa, redención y los límites de la moral.", "cover": "portadas/032_las_buenas_intenciones.jpg", "id": 32}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LOS OLVIDADOS (SAGA JOHN PULLER 2)", "author": "David Baldacci", "synopsis": "John Puller vuelve a enfrentarse a una peligrosa conspiración mientras investiga un caso lleno de secretos militares y traiciones. David Baldacci ofrece un thriller trepidante, cargado de acción y suspense, donde cada descubrimiento acerca al protagonista a una amenaza inesperada.", "cover": "portadas/033_los_olvidados_saga_john_puller_2.jpg", "id": 33}, {"genre": "NOVELA NEGRA / THRILLER", "title": "MENTIRA", "author": "Juan Gómez-Jurado", "synopsis": "Una historia vertiginosa donde la verdad se esconde entre engaños y manipulaciones. Juan Gómez-Jurado crea un thriller lleno de ritmo, tensión y giros sorprendentes que mantienen al lector atrapado hasta el desenlace final.", "cover": "portadas/034_mentira.jpg", "id": 34}, {"genre": "NOVELA NEGRA / THRILLER", "title": "MORIR DOS VECES", "author": "Susana Rodríguez Lezaun", "synopsis": "Un crimen aparentemente resuelto vuelve a abrir heridas del pasado. Susana Rodríguez Lezaun construye una novela negra intensa, donde la investigación policial se mezcla con conflictos personales y secretos ocultos durante años.", "cover": "portadas/035_morir_dos_veces.jpg", "id": 35}, {"genre": "NOVELA NEGRA / THRILLER", "title": "QUERIDA DEBBIE", "author": "Freida McFadden", "synopsis": "Una carta inesperada desencadena una inquietante cadena de acontecimientos. Freida McFadden vuelve a explorar los rincones más oscuros de las relaciones humanas en un thriller psicológico lleno de tensión, secretos y giros inesperados.", "cover": "portadas/036_querida_debbie.jpg", "id": 36}, {"genre": "NOVELA NEGRA / THRILLER", "title": "RESULTADO FINAL", "author": "Don Winslow", "synopsis": "Don Winslow combina crimen, poder y ambición en una historia intensa y adictiva. A medida que se acerca el desenlace, los protagonistas deberán tomar decisiones extremas en un mundo marcado por la corrupción y la violencia. Un thriller vibrante y lleno de acción.", "cover": "portadas/037_resultado_final.jpg", "id": 37}, {"genre": "NOVELA NEGRA / THRILLER", "title": "SEGUNDA OPORTUNIDAD", "author": "Nora Roberts", "synopsis": "Una mezcla de suspense y emociones donde el pasado vuelve para poner en peligro una nueva vida. Nora Roberts construye una historia absorbente sobre segundas oportunidades, secretos ocultos y la lucha por escapar de viejas amenazas.", "cover": "portadas/038_segunda_oportunidad.jpg", "id": 38}, {"genre": "NOVELA NEGRA / THRILLER", "title": "EL SÓTANO", "author": "Roberto Leal", "synopsis": "Un hombre marcado por la desaparición de su pareja intenta rehacer su vida. La aparición de una mujer misteriosa lo arrastra a una trama de secretos, obsesión y mentiras. Un thriller psicológico intenso, lleno de tensión y giros inesperados.", "cover": "portadas/039_el_sotano.jpg", "id": 39}, {"genre": "NOVELA NEGRA / THRILLER", "title": "LA VERDAD OCULTA DE WALTER ANDRETTI", "author": "Antonio Manzini", "synopsis": "Walter Andretti esconde un pasado lleno de sombras bajo una apariencia de normalidad. Cuando los secretos empiezan a salir a la luz, se verá obligado a enfrentarse a verdades incómodas y decisiones límite. Una novela de intriga y tensión psicológica con el inconfundible estilo de Antonio Manzini.", "cover": "portadas/040_la_verdad_oculta_de_walter_andretti.jpg", "id": 40}, {"genre": "NOVELA NEGRA / THRILLER", "title": "PRODUCTOS TÓXICOS s siente que la mujer de la que se enamoró ya no es la misma. Buscando recuperar su relación, ambos se refugian en un lugar lleno de extrañas presencias y secretos inquietantes. Un thriller romántico con tintes sobrenaturales sobre el amor, la obsesión y lo inexplicable.", "cover": "portadas/080_layla.jpg", "id": 80}, {"genre": "NARRATIVA DE HUMOR", "title": "COME CHOCOLATE Y NO DISCUTAS CON IDIOTAS", "author": "Jessica Gómez", "synopsis": "Jessica Gómez propone una lectura divertida y liberadora sobre aprender a relativizar los problemas y elegir mejor las batallas. Con humor directo y mucho sentido común, el libro invita a cuidarse, reírse y no gastar energía en quien no la merece. Una obra ligera, irónica y reconfortante.", "cover": "portadas/081_come_chocolate_y_no_discutas_con_idiotas.jpg", "id": 81}, {"genre": "NARRATIVA DE HUMOR", "title": "LA INTRIGA DEL FUNERAL INCONVENIENTE", "author": "Eduardo Mendoza", "synopsis": "Eduardo Mendoza despliega su ironía y su mirada satírica en una historia llena de situaciones absurdas, personajes excéntricos y misterio disparatado. Un funeral inesperado desencadena una cadena de enredos que mezcla humor, intriga y crítica social. Una novela ingeniosa y muy entretenida.", "cover": "portadas/082_la_intriga_del_funeral_inconveniente.jpg", "id": 82}, {"genre": "NARRATIVA DE HUMOR", "title": "LA VIDA ES SUERO", "author": "Enfermera Saturada", "synopsis": "Enfermera Saturada convierte el día a día sanitario en una fuente inagotable de humor, ternura y situaciones reconocibles. Con anécdotas cercanas y mucho ingenio, el libro retrata la vocación, el cansancio y la humanidad de quienes cuidan. Una lectura divertida y muy cómplice.", "cover": "portadas/083_la_vida_es_suero.jpg", "id": 83}, {"genre": "NARRATIVA DE HUMOR", "title": "LAS BRAGAS AL SOL", "author": "Regina Rodríguez Sirvent", "synopsis": "Regina Rodríguez Sirvent firma una historia fresca, descarada y llena de humor sobre mujeres que se atreven a vivir sin pedir permiso. Entre confesiones, tropiezos y momentos delirantes, la novela habla de amistad, libertad y autoestima. Una lectura irreverente y muy vitalista.", "cover": "portadas/084_las_bragas_al_sol.jpg", "id": 84}, {"genre": "NARRATIVA DE HUMOR", "title": "PONME OTRO VINO, QUE AÚN TE VEO FEO", "author": "Sibila Freijo", "synopsis": "Sibila Freijo reúne humor, desamor y mucha ironía en una obra pensada para reírse de los dramas cotidianos. Con tono desenfadado, el libro convierte los tropiezos sentimentales en una excusa para brindar, soltar lastre y seguir adelante. Una lectura divertida y sin complejos.", "cover": "portadas/085_ponme_otro_vino_que_aun_te_veo_feo.jpg", "id": 85}, {"genre": "SALUD", "title": "ENVEJECER ES OPCIONAL", "author": "José Hernández Poveda", "synopsis": "José Hernández Poveda plantea una mirada práctica y optimista sobre el paso del tiempo, centrada en hábitos que ayudan a vivir con más energía y bienestar. El libro invita a revisar rutinas, cuidar el cuerpo y mantener una actitud activa ante la edad. Una guía clara para envejecer mejor.", "cover": "portadas/086_envejecer_es_opcional.jpg", "id": 86}, {"genre": "SALUD", "title": "EL PODER DE LA SUPLEMENTACIÓN", "author": "Odile Fernández", "synopsis": "Una guía práctica para entender qué suplementos pueden ser útiles y cuáles no tienen respaldo científico. La autora explica cómo complementar la alimentación y mejorar la salud sin caer en modas ni falsas promesas. Con un enfoque claro y accesible, ayuda a suplementarse de forma consciente y segura.", "cover": "portadas/087_el_poder_de_la_suplementacion.jpg", "id": 87}, {"genre": "SALUD", "title": "NUNCA ESTUVISTE SOLO", "author": "Albert Espinosa", "synopsis": "Albert Espinosa ofrece un libro emotivo y esperanzador sobre la compañía, la pérdida y la capacidad de encontrar luz en los momentos difíciles. Con su estilo cercano, comparte reflexiones que invitan a mirar la vida con gratitud y valentía. Una obra sensible y reconfortante.", "cover": "portadas/088_nunca_estuviste_solo.jpg", "id": 88}];
const genreColors = {"NOVELA CONTEMPORÁNEA": "#ef9a9a", "NOVELA NEGRA / THRILLER": "#bfe8c9", "NOVELA HISTÓRICA": "#d7bde8", "NOVELA ROMÁNTICA": "#a9cfe8", "NARRATIVA DE HUMOR": "#b9d99b", "SALUD": "#ffc0cb"}; const order = [...new Set(books.map(b=>b.genre))]; const app=document.getElementById('app'), search=document.getElementById('search'), genre=document.getElementById('genre'), count=document.getElementById('count'), modal=document.getElementById('modal'), dialogInner=document.getElementById('dialogInner');
genre.innerHTML='<option value="">Todos los géneros</option>'+order.map(g=>`<option>${g}</option>`).join(''); function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}
function render(){ const q=norm(search.value), g=genre.value; const filtered=books.filter(b=>(!g||b.genre===g)&&(!q||norm(b.title+' '+b.author+' '+b.synopsis).includes(q))); count.textContent=`${filtered.length} libros`; app.innerHTML=''; if(!filtered.length){app.innerHTML='<div class="empty">No hay resultados.</div>';return;} for(const gr of order){ const items=filtered.filter(b=>b.genre===gr); if(!items.length)continue; const title=document.createElement('div'); title.className='section-title'; title.textContent=gr; title.style.background=genreColors[gr]||'#eee'; app.appendChild(title); const grid=document.createElement('div'); grid.className='grid'; items.forEach(b=>{ const card=document.createElement('article'); card.className='card'; card.innerHTML=`<div class="coverWrap"><img class="cover" src="${b.cover}" alt="Portada de ${b.title}"></div><div class="meta"><div class="title">${b.title}</div><div class="author">${b.author}</div><span class="genrePill" style="background:${genreColors[b.genre]||'#eee'}">${b.genre}</span></div>`; card.onclick=()=>openBook(b); grid.appendChild(card); }); app.appendChild(grid); } }
function openBook(b){ dialogInner.innerHTML=`<div><img src="${b.cover}" alt="Portada de ${b.title}"></div><div><h2>${b.title}</h2><div class="by">${b.author}</div><span class="genrePill" style="background:${genreColors[b.genre]||'#eee'}">${b.genre}</span><p class="synopsis">${b.synopsis}</p></div>`; modal.classList.add('open'); }
document.getElementById('close').onclick=()=>modal.classList.remove('open'); modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open');}); document.addEventListener('keydown',e=>{if(e.key==='Escape')modal.classList.remove('open');}); search.addEventListener('input',render); genre.addEventListener('change',render); render();
</script></body></html>
